<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 — URL Manager</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #edf2f7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  background: #0f2942;
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,.35);
}
header h1 { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: .5px; }

.login-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
}
.login-card {
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 4px 24px rgba(0,0,0,.12);
  padding: 36px 32px 30px;
  width: 100%;
  max-width: 360px;
}
.login-card h2 {
  font-size: 20px;
  font-weight: 700;
  color: #1a202c;
  margin-bottom: 24px;
  text-align: center;
}
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: #4a5568;
  margin-bottom: 6px;
  letter-spacing: .3px;
}
.field input {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid #cbd5e0;
  border-radius: 6px;
  font-size: 14px;
  color: #2d3748;
  background: #fff;
  transition: border-color .15s, box-shadow .15s;
  outline: none;
}
.field input:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59,130,246,.18);
}
.btn-login {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s;
  letter-spacing: .3px;
}
.btn-login:hover { background: #1d4ed8; }
.btn-login:disabled { background: #93c5fd; cursor: not-allowed; }
.error-msg {
  margin-top: 14px;
  padding: 9px 12px;
  background: #fff5f5;
  border: 1px solid #fed7d7;
  border-radius: 6px;
  color: #c53030;
  font-size: 13px;
  text-align: center;
  display: none;
}
</style>
</head>
<body>
<header>
  <h1>URL Manager</h1>
</header>
<div class="login-wrap">
  <div class="login-card">
    <h2>登入</h2>
    <div class="field">
      <label for="username">帳號</label>
      <input type="text" id="username" autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label for="password">密碼</label>
      <input type="password" id="password" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-login">登入</button>
    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<script>
'use strict';
const usernameEl = document.getElementById('username');
const passwordEl = document.getElementById('password');
const btnLogin   = document.getElementById('btn-login');
const errorEl    = document.getElementById('error-msg');

async function doLogin() {
  const username = usernameEl.value.trim();
  const password = passwordEl.value;
  if (!username || !password) {
    showError('請輸入帳號和密碼');
    return;
  }
  btnLogin.disabled = true;
  btnLogin.textContent = '登入中…';
  errorEl.style.display = 'none';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password}),
    });
    if (res.ok) {
      window.location.href = '/';
    } else {
      const data = await res.json().catch(() => ({}));
      showError(data.detail || '登入失敗');
    }
  } catch (e) {
    showError('網路錯誤，請稍後再試');
  } finally {
    btnLogin.disabled = false;
    btnLogin.textContent = '登入';
  }
}

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
}

btnLogin.addEventListener('click', doLogin);
passwordEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
usernameEl.addEventListener('keydown', e => { if (e.key === 'Enter') passwordEl.focus(); });
</script>
</body>
</html>
